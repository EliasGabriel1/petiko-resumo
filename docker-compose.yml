
services:
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_service

    ports:
      - "3307:3306"

    volumes:
      - mysql_auth_data:/var/lib/mysql

  mysql-bff:
    image: mysql:8.0
    container_name: mysql-bff
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bff_service

    ports:
      - "3308:3306"

    volumes:
      - mysql_bff_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: petiko-phpmyadmin
    restart: always

    environment:
      PMA_HOST: mysql-auth
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "8080:80"

volumes:
  mysql_auth_data:
  mysql_bff_data: